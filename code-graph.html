me", "kind": "import", "label": "引用包"}, {"source": "src__miniclaw__utils__common_py", "target": "external__typing", "kind": "import", "label": "引用包"}, {"source": "src__miniclaw__utils__logger_py", "target": "external__loguru", "kind": "import", "label": "引用包"}, {"source": "src__miniclaw__utils__logger_py", "target": "external__pathlib", "kind": "import", "label": "引用包"}, {"source": "tests__agents__providers__test_litellm_provider_py", "target": "external__types", "kind": "import", "label": "引用包"}, {"source": "tests__agents__tools__test_launch_detached_py", "target": "external__miniclaw_agents_tools", "kind": "import", "label": "引用包"}];
    const typeStyles = {"entry": {"color": "#1890ff", "label": "入口/路由"}, "frontend": {"color": "#13c2c2", "label": "前端视图"}, "service": {"color": "#52c41a", "label": "业务模块"}, "model": {"color": "#722ed1", "label": "模型/类型"}, "config": {"color": "#fa8c16", "label": "配置/构建"}, "data": {"color": "#f5222d", "label": "数据/API"}, "tool": {"color": "#8888aa", "label": "工具脚本"}, "external": {"color": "#ffffff", "label": "外部依赖"}};
    const linkStyles = {"import": {"color": "#52c41a", "label": "导入 / 依赖"}, "route": {"color": "#1890ff", "label": "路由 / 页面跳转"}, "api": {"color": "#fa8c16", "label": "API 调用"}, "data": {"color": "#eb2f96", "label": "数据 / 状态 / 存储"}};
    const width = window.innerWidth;
    const height = window.innerHeight;
    const container = d3.select('#graph-container');
    const svg = container.append('svg');
    const root = svg.append('g');
    const linkLayer = root.append('g').attr('class', 'links');
    const labelLayer = root.append('g').attr('class', 'link-labels');
    const nodeLayer = root.append('g').attr('class', 'nodes');
    const tooltip = d3.select('#tooltip');
    const zoom = d3.zoom().scaleExtent([0.2, 4]).on('zoom', event => root.attr('transform', event.transform));
    svg.call(zoom);
    const simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.kind === 'import' ? 90 : 120).strength(0.25))
        .force('charge', d3.forceManyBody().strength(d => d.type === 'external' ? -180 : -320))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => (d.size || 12) + 18));
    const link = linkLayer.selectAll('line').data(links).enter().append('line').attr('class', 'link-line').attr('stroke', d => (linkStyles[d.kind] || linkStyles.import).color).attr('stroke-width', d => d.kind === 'route' ? 2.2 : 1.6);
    const linkLabel = labelLayer.selectAll('text').data(links).enter().append('text').attr('class', 'link-label').text(d => d.label || '');
    const node = nodeLayer.selectAll('g').data(nodes).enter().append('g').attr('class', 'node-group').call(d3.drag().on('start', dragstarted).on('drag', dragged).on('end', dragended));
    node.append('circle').attr('class', 'node-highlight').attr('r', d => (d.size || 12) + 5);
    node.append('circle').attr('class', 'node-circle').attr('r', d => d.size || 12).attr('fill', d => (typeStyles[d.type] || typeStyles.service).color).attr('stroke', d => d.type === 'external' ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.12)');
    node.append('text').attr('class', 'node-label').attr('dy', d => (d.size || 12) + 15).attr('text-anchor', 'middle').text(d => d.label);
    let selectedNodeId = null;
    node.on('mouseover', function(event, d) { showTooltip(event, d); })
        .on('mousemove', function(event, d) { if (selectedNodeId !== d.id) moveTooltip(event); })
        .on('mouseout', function(event, d) { if (selectedNodeId !== d.id) hideTooltip(); })
        .on('click', function(event, d) {
            event.stopPropagation();
            if (selectedNodeId === d.id) {
                selectedNodeId = null;
                node.classed('selected', false);
                hideTooltip();
                clearFocus();
                return;
            }
            selectedNodeId = d.id;
            node.classed('selected', n => n.id === d.id);
            showTooltip(event, d);
            focusNode(d.id);
        });
    svg.on('click', function() {
        selectedNodeId = null;
        node.classed('selected', false);
        hideTooltip();
        clearFocus();
    });
    simulation.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        linkLabel.attr('x', d => (d.source.x + d.target.x) / 2).attr('y', d => (d.source.y + d.target.y) / 2);
        node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
    });
    function showTooltip(event, d) {
        tooltip.style('display', 'block').html(
            '<div class="tt-name">' + escapeHtml(d.label) + '</div>' +
            '<div class="tt-type">' + escapeHtml((typeStyles[d.type] || { label: d.type }).label) + ' · ' + escapeHtml(d.module || '未分类') + '</div>' +
            '<div class="tt-desc">' + escapeHtml(d.desc || '') + '</div>' +
            '<div class="tt-filepath">' + escapeHtml(d.path || '虚拟节点 / 外部依赖') + '</div>'
        );
        moveTooltip(event);
    }
    function moveTooltip(event) {
        const pad = 18;
        const box = tooltip.node().getBoundingClientRect();
        let left = event.pageX + pad;
        let top = event.pageY + pad;
        if (left + box.width > window.innerWidth - 10) left = event.pageX - box.width - pad;
        if (top + box.height > window.innerHeight - 10) top = event.pageY - box.height - pad;
        tooltip.style('left', left + 'px').style('top', top + 'px');
    }
    function hideTooltip() { tooltip.style('display', 'none'); }
    function focusNode(nodeId) {
        const connected = new Set([nodeId]);
        links.forEach(l => {
            const s = typeof l.source === 'object' ? l.source.id : l.source;
            const t = typeof l.target === 'object' ? l.target.id : l.target;
            if (s === nodeId) connected.add(t);
            if (t === nodeId) connected.add(s);
        });
        node.style('opacity', d => connected.has(d.id) ? 1 : 0.18);
        link.style('opacity', d => {
            const s = typeof d.source === 'object' ? d.source.id : d.source;
            const t = typeof d.target === 'object' ? d.target.id : d.target;
            return s === nodeId || t === nodeId ? 0.95 : 0.08;
        });
        linkLabel.style('opacity', d => {
            const s = typeof d.source === 'object' ? d.source.id : d.source;
            const t = typeof d.target === 'object' ? d.target.id : d.target;
            return s === nodeId || t === nodeId ? 0.9 : 0.06;
        });
    }
    function clearFocus() {
        node.style('opacity', 1);
        link.style('opacity', 1);
        linkLabel.style('opacity', 1);
    }
    function filterGraph(keyword) {
        const q = (keyword || '').trim().toLowerCase();
        if (!q) {
            clearFocus();
            node.style('display', null);
            link.style('display', null);
            linkLabel.style('display', null);
            return;
        }
        const matched = new Set(nodes.filter(d =>
            (d.label || '').toLowerCase().includes(q) ||
            (d.module || '').toLowerCase().includes(q) ||
            (d.path || '').toLowerCase().includes(q) ||
            (d.desc || '').toLowerCase().includes(q)
        ).map(d => d.id));
        node.style('display', d => matched.has(d.id) ? null : 'none');
        link.style('display', d => {
            const s = typeof d.source === 'object' ? d.source.id : d.source;
            const t = typeof d.target === 'object' ? d.target.id : d.target;
            return matched.has(s) || matched.has(t) ? null : 'none';
        });
        linkLabel.style('display', d => {
            const s = typeof d.source === 'object' ? d.source.id : d.source;
            const t = typeof d.target === 'object' ? d.target.id : d.target;
            return matched.has(s) || matched.has(t) ? null : 'none';
        });
    }
    function zoomToFit() {
        const bounds = root.node().getBBox();
        if (!bounds.width || !bounds.height) return;
        const fullWidth = window.innerWidth;
        const fullHeight = window.innerHeight;
        const scale = Math.max(0.2, Math.min(2.2, 0.85 / Math.max(bounds.width / fullWidth, bounds.height / fullHeight)));
        const tx = fullWidth / 2 - scale * (bounds.x + bounds.width / 2);
        const ty = fullHeight / 2 - scale * (bounds.y + bounds.height / 2);
        svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }
    function resetGraph() {
        simulation.alpha(0.9).restart();
        clearFocus();
        selectedNodeId = null;
        node.classed('selected', false).style('display', null).style('opacity', 1);
        link.style('display', null).style('opacity', 1);
        linkLabel.style('display', null).style('opacity', 1);
        document.getElementById('search-input').value = '';
        setTimeout(zoomToFit, 500);
    }
    function exportPNG() {
        const serializer = new XMLSerializer();
        const source = serializer.serializeToString(svg.node());
        const blob = new Blob([source], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth * 2;
            canvas.height = window.innerHeight * 2;
            const ctx = canvas.getContext('2d');
            ctx.scale(2, 2);
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
            ctx.drawImage(img, 0, 0);
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = 'code-graph.png';
            a.click();
            URL.revokeObjectURL(url);
        };
        img.src = url;
    }
    function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
    }
    function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
    }
    function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
    }
    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
    setTimeout(zoomToFit, 650);
    window.addEventListener('resize', () => location.reload());
