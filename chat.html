<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MiniClaw 流式对话</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f6f8fa;
            color: #1f2328;
        }

        .app {
            max-width: 960px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
        }

        .chat {
            flex: 1;
            overflow: auto;
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 88%;
            padding: 10px 12px;
            border-radius: 10px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }

        .user {
            align-self: flex-end;
            background: #0969da;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .assistant {
            align-self: flex-start;
            background: #f3f4f6;
            color: #111827;
            border-bottom-left-radius: 4px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 8px;
            align-items: end;
        }

        textarea {
            width: 100%;
            min-height: 48px;
            max-height: 180px;
            resize: vertical;
            border: 1px solid #d0d7de;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
        }

        #sendBtn {
            background: #1f883d;
            color: #fff;
        }

        #stopBtn {
            background: #cf222e;
            color: #fff;
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .status {
            min-height: 18px;
            font-size: 12px;
            color: #57606a;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="title">MiniClaw Streaming Chat</div>
    <div id="chat" class="chat"></div>

    <div class="controls">
        <textarea id="prompt" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
        <button id="sendBtn">发送</button>
        <button id="stopBtn" disabled>停止</button>
    </div>

    <div id="status" class="status">就绪</div>
</div>

<script>
    const API_URL = "http://localhost:8000/api/llm/stream";

    const chatEl = document.getElementById("chat");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusEl = document.getElementById("status");

    // Keep full history so /stream can continue with context and tool-call follow-ups.
    const messages = [];
    let currentController = null;

    function setStatus(text) {
        statusEl.textContent = text;
    }

    function setSending(sending) {
        sendBtn.disabled = sending;
        stopBtn.disabled = !sending;
        promptEl.disabled = sending;
    }

    function scrollBottom() {
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function appendMessage(role, content = "") {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.textContent = content;
        chatEl.appendChild(div);
        scrollBottom();
        return div;
    }

    function parseSseFrames(buffer) {
        const frames = [];
        let splitIndex;
        while ((splitIndex = buffer.indexOf("\n\n")) !== -1) {
            frames.push(buffer.slice(0, splitIndex));
            buffer = buffer.slice(splitIndex + 2);
        }
        return {frames, rest: buffer};
    }

    function parseFrame(frameText) {
        const lines = frameText.split(/\r?\n/);
        let eventName = "message";
        const dataLines = [];

        for (const line of lines) {
            if (line.startsWith("event:")) {
                eventName = line.slice(6).trim();
            } else if (line.startsWith("data:")) {
                dataLines.push(line.slice(5).trim());
            }
        }

        let data = {};
        const joined = dataLines.join("\n");
        if (joined) {
            try {
                data = JSON.parse(joined);
            } catch {
                data = {raw: joined};
            }
        }

        return {eventName, data};
    }

    async function sendMessage() {
        const text = promptEl.value.trim();
        if (!text || currentController) return;

        messages.push({role: "user", content: text});
        appendMessage("user", text);
        promptEl.value = "";

        let assistantText = "";
        let activeAssistantEl = appendMessage("assistant", "");
        let activeAssistantText = "";

        currentController = new AbortController();
        setSending(true);
        setStatus("请求中...");

        try {
            const resp = await fetch(API_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    model: "deepseek/deepseek-chat",
                    messages,
                    temperature: 0.7,
                    max_tokens: 1024
                }),
                signal: currentController.signal
            });

            if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
            if (!resp.body) throw new Error("响应体为空，无法读取流");

            setStatus("流式接收中...");

            const reader = resp.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";

            while (true) {
                const {value, done} = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, {stream: true});
                const {frames, rest} = parseSseFrames(buffer);
                buffer = rest;

                for (const frame of frames) {
                    if (!frame.trim()) continue;
                    const {eventName, data} = parseFrame(frame);

                    if (eventName === "chunk") {
                        const delta = typeof data.delta === "string" ? data.delta : "";
                        if (delta) {
                            assistantText += delta;
                            activeAssistantText += delta;
                            activeAssistantEl.textContent = activeAssistantText;
                            scrollBottom();
                        }
                    } else if (eventName === "tool_call") {
                        if (!activeAssistantText.trim()) {
                            activeAssistantEl.textContent = "(思考中...)";
                        }

                        const toolName = data.function.name || "未知工具";
                        const toolArgs = JSON.stringify(data.function.arguments || {}, null, 2);
                        const toolEl = appendMessage("assistant", `[工具调用] ${toolName}\n${toolArgs}`);
                        toolEl.style.fontStyle = "italic";

                        activeAssistantEl = appendMessage("assistant", "");
                        activeAssistantText = "";
                    }  else if (eventName === "done") {
                        setStatus(`完成: ${data.finish_reason || "stop"}`);
                    } else if (eventName === "error") {
                        throw new Error(data.error || "服务端返回错误");
                    }
                }
            }

            if (activeAssistantEl && !activeAssistantEl.textContent.trim()) {
                activeAssistantEl.remove();
            }

            messages.push({role: "assistant", content: assistantText});
            if (!assistantText) {
                const emptyEl = appendMessage("assistant", "(未收到文本输出，可能触发了仅工具调用流程)");
                emptyEl.style.fontStyle = "italic";
            }
            if (statusEl.textContent.startsWith("流式接收中")) {
                setStatus("完成");
            }
        } catch (err) {
            if (err && err.name === "AbortError") {
                setStatus("已停止");
            } else {
                setStatus("请求失败");
                const message = err && err.message ? err.message : String(err);
                if (!activeAssistantEl.textContent) activeAssistantEl.textContent = `错误: ${message}`;
            }
        } finally {
            currentController = null;
            setSending(false);
        }
    }

    function stopStream() {
        if (currentController) currentController.abort();
    }

    sendBtn.addEventListener("click", sendMessage);
    stopBtn.addEventListener("click", stopStream);

    promptEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
