<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MiniClaw 对话</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f6f8fa;
            color: #1f2328;
        }

        .app {
            max-width: 960px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
        }

        .chat {
            flex: 1;
            overflow: auto;
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 88%;
            padding: 10px 12px;
            border-radius: 10px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }

        .user {
            align-self: flex-end;
            background: #0969da;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .assistant {
            align-self: flex-start;
            background: #f3f4f6;
            color: #111827;
            border-bottom-left-radius: 4px;
        }

        .reasoning {
            align-self: flex-start;
            background: #fff8e1;
            color: #795548;
            border-left: 3px solid #ffb300;
            border-radius: 4px;
            font-style: italic;
            font-size: 13px;
        }

        .meta {
            align-self: flex-start;
            font-size: 11px;
            color: #57606a;
            padding: 2px 4px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 8px;
            align-items: end;
        }

        textarea {
            width: 100%;
            min-height: 48px;
            max-height: 180px;
            resize: vertical;
            border: 1px solid #d0d7de;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
        }

        #sendBtn {
            background: #1f883d;
            color: #fff;
        }

        #stopBtn {
            background: #cf222e;
            color: #fff;
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .status {
            min-height: 18px;
            font-size: 12px;
            color: #57606a;
        }

        .typing {
            align-self: flex-start;
            display: inline-flex;
            gap: 4px;
            padding: 12px 16px;
            background: #f3f4f6;
            border-radius: 10px;
            border-bottom-left-radius: 4px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #9aa0a6;
            border-radius: 50%;
            animation: typing 1.4s infinite both;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 80%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            40% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="title">MiniClaw Chat</div>
    <div id="chat" class="chat"></div>

    <div class="controls">
        <textarea id="prompt" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
        <button id="sendBtn">发送</button>
        <button id="stopBtn" disabled>停止</button>
    </div>

    <div id="status" class="status">就绪</div>
</div>

<script>
    const API_URL = "http://localhost:8000/api/llm/chat";

    const chatEl = document.getElementById("chat");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusEl = document.getElementById("status");

    // 生成一个简单的会话 ID
    const CID = "chat_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);

    let currentController = null;

    function setStatus(text) {
        statusEl.textContent = text;
    }

    function setSending(sending) {
        sendBtn.disabled = sending;
        stopBtn.disabled = !sending;
        promptEl.disabled = sending;
    }

    function scrollBottom() {
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function appendMessage(role, content) {
        const div = document.createElement("div");
        div.className = "msg " + role;
        div.textContent = content;
        chatEl.appendChild(div);
        scrollBottom();
        return div;
    }

    function appendReasoning(content) {
        const div = document.createElement("div");
        div.className = "reasoning";
        div.textContent = "🧠 " + content;
        chatEl.appendChild(div);
        scrollBottom();
        return div;
    }

    function appendMeta(text) {
        const div = document.createElement("div");
        div.className = "meta";
        div.textContent = text;
        chatEl.appendChild(div);
        scrollBottom();
        return div;
    }

    function showTyping() {
        const container = document.createElement("div");
        container.className = "typing";
        container.id = "typingIndicator";
        for (let i = 0; i < 3; i++) {
            const dot = document.createElement("span");
            container.appendChild(dot);
        }
        chatEl.appendChild(container);
        scrollBottom();
        return container;
    }

    function hideTyping() {
        const el = document.getElementById("typingIndicator");
        if (el) el.remove();
    }

    async function sendMessage() {
        const text = promptEl.value.trim();
        if (!text || currentController) return;

        // 历史由后端通过 cid 维持，前端只发当前消息
        appendMessage("user", text);
        promptEl.value = "";

        currentController = new AbortController();
        setSending(true);
        setStatus("请求中...");
        showTyping();

        try {
            const resp = await fetch(API_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    cid: CID,
                    model: "deepseek/deepseek-chat",
                    messages: [{role: "user", content: text}],
                    temperature: 0.7,
                    max_tokens: 1024
                }),
                signal: currentController.signal
            });

            if (!resp.ok) {
                let detail = "";
                try {
                    const errData = await resp.json();
                    detail = errData.detail || resp.statusText;
                } catch {
                    detail = resp.statusText;
                }
                throw new Error("HTTP " + resp.status + " " + detail);
            }

            hideTyping();
            setStatus("处理中...");

            const result = await resp.json();

            // 显示思考过程（如果有）
            if (result.reasoning_content) {
                appendReasoning(result.reasoning_content);
            }

            // 显示助手回复
            if (result.content) {
                appendMessage("assistant", result.content);
            } else {
                const emptyEl = appendMessage("assistant", "(未返回文本内容)");
                emptyEl.style.fontStyle = "italic";
            }

            // 显示 Token 用量
            const metaParts = [];
            if (result.prompt_tokens !== undefined) metaParts.push("输入: " + result.prompt_tokens + " tokens");
            if (result.completion_tokens !== undefined) metaParts.push("输出: " + result.completion_tokens + " tokens");
            if (result.total_tokens !== undefined) metaParts.push("总计: " + result.total_tokens + " tokens");
            if (result.cost_usd !== undefined) metaParts.push("费用: $" + Number(result.cost_usd).toFixed(6));
            if (metaParts.length > 0) {
                appendMeta("📊 " + metaParts.join(" | "));
            }

            setStatus("完成");

        } catch (err) {
            hideTyping();
            if (err && err.name === "AbortError") {
                setStatus("已停止");
            } else {
                setStatus("请求失败");
                const message = err && err.message ? err.message : String(err);
                appendMessage("assistant", "错误: " + message);
            }
        } finally {
            currentController = null;
            setSending(false);
        }
    }

    function stopRequest() {
        if (currentController) {
            currentController.abort();
        }
    }

    sendBtn.addEventListener("click", sendMessage);
    stopBtn.addEventListener("click", stopRequest);

    promptEl.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
